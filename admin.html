<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора</title>
    <link rel="shortcut icon" href="img/admin.png">
	<link rel="stylesheet" href="css/admin.css">
	<link rel="stylesheet" href="css/alert.css">
</head>
<body>

<div id="login-screen" style="display: none;">
    <div class="login-box">
        <h2>Авторизация</h2>
        <form id="login-form">
            <input type="text" id="login-password" placeholder="Пароль" style="-webkit-text-security: disc; text-security: disc;" required />
            <button type="submit">Войти</button>
        </form>
    </div>
</div>

<div id="app-content" style="display: none;">
<main>
    <div id="lottery-selector">
        <h2 id="lottery-list-title">Лотереи</h2>
		<div id="lottery-create-entry">
			<button id="lottery-queue" onclick="window.location.href='queue.html'" class="lottery-button">Очереди лотерей</button>
			<button id="open-create-form">Создать</button>
			<hr class="separator">
		</div>
        <div id="lottery-create-form" style="display: none;">
            <h2>Создание новой лотереи</h2>
            <input type="text" id="new-lottery-name" placeholder="Название лотереи" />
            <input type="number" id="new-lottery-total" placeholder="Количество свободных" />
            <input type="number" id="new-lottery-price" placeholder="Цена за номер" />
            <input type="number" id="new-lottery-free" placeholder="Количество бесплатных" />
            <label style="text-align: left; font-size: 14px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="enable-surprise" /> Сюрпризы
            </label>
            <input type="number" id="surprise-count" placeholder="Количество сюрпризов" style="display: none;" />
            <input type="number" id="surprise-price" placeholder="Цена за сюрприз" style="display: none;" />
            <div id="lottery-create-buttons">
                <button id="create-back-button">Назад</button>
                <button id="create-lottery-button">Создать</button>
            </div>
        </div>
        <div id="lotteries-list"></div>
    </div>

    <div id="admin-panel" style="display: none;">
        <button id="back-button">Назад</button>
        <h2 id="lottery-title">Лотерея</h2>
        <button id="delete-lottery-button">Удалить лотерею</button>
        <button id="payment-toggle-button"></button>
        <p id="available-count"></p>
        <button id="view-numbers-button">Посмотреть номера</button>
        <h3>Бесплатные номера:</h3>
        <div id="free-numbers-list"></div>
        <h3>Пользователи:</h3>
        <div id="users-list"></div>
    </div>
</main>
</div>

<div id="alertOverlay"></div>
<div id="alertBox">
    <span id="alertText"></span>
    <div class="btn-right">
        <button id="alertOkBtn">OK</button>
    </div>
</div>
<div id="confirmBox">
    <span id="confirmText"></span>
    <div class="btn-right">
        <button id="confirmCancelBtn">Отмена</button>
        <button id="confirmOkBtn">OK</button>
    </div>
</div>
<div id="numbersModal">
    <div class="modal-content">
        <span id="closeNumbersModal" class="close">&times;</span>
        <h2>Свободные номера</h2>
        <div id="all-numbers-list"></div>
    </div>
</div>
<script type="module" src="js/admin.js" defer></script>
</body>
</html>
