<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Очередь копилки</title>
    <style>
        :root {
            --primary: #27ae60;
            --primary-light: #ebf7f0;
            --bg: #f4f9f6;
            --text: #2c3e50;
            --highlight: #f1c40f;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Скрытие «крестика» в полях типа search */
        input::-webkit-search-decoration,
        input::-webkit-search-cancel-button,
        input::-webkit-search-results-button,
        input::-webkit-search-results-decoration { display: none; }

        .container { 
            background: white; 
            width: 100%;
            max-width: 450px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
        }

        .header {
            position: sticky;
            top: 0;
            background: white;
            padding: 20px 20px 10px 20px;
            z-index: 100;
            border-bottom: 1px solid #eef2f0;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 { margin: 0; color: var(--primary); font-size: 20px; }

        .action-btns { display: flex; gap: 8px; }

        .btn-sq {
            width: 36px;
            height: 36px;
            border: 1px solid #eef2f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.2s;
        }

        .btn-sq:hover { background: var(--primary-light); border-color: var(--primary); }
        .btn-sq.del:hover { background: #fff0f0; border-color: var(--danger); }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0f4f2;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        #peopleList { 
            list-style: none; 
            padding: 20px; 
            margin: 0; 
            flex-grow: 1;
        }

        li { 
            background: white; 
            border: 1px solid #eef2f0; 
            margin-bottom: 8px; 
            padding: 10px 12px;
            display: flex; 
            align-items: flex-start;
            border-radius: 14px;
            transition: 0.3s ease;
        }

        li.found {
            border-color: var(--highlight);
            background: #fffdf0;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(241, 196, 15, 0.2);
        }

        .number {
            background: var(--primary);
            color: white;
            min-width: 40px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 13px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 10px;
            margin-top: 2px;
        }

        .name { 
            flex: 1; 
            font-weight: 500; 
            font-size: 15px; 
            color: var(--text);
            word-break: break-word;
            line-height: 1.4;
            padding-right: 10px;
        }

        .controls { 
            display: flex; 
            gap: 4px; 
            margin-top: 2px;
        }

        .move-btn, .delete-btn { 
            border: none;
            background: #f8faf9;
            width: 30px;
            height: 30px;
            cursor: pointer; 
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #95a5a6;
        }
        .move-btn:hover { background: var(--primary-light); color: var(--primary); }
        .delete-btn:hover { background: #fff0f0; color: var(--danger); }

        .footer {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #eef2f0;
            display: flex;
            gap: 10px;
        }

        .footer input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            outline: none;
            font-size: 16px;
        }

        .footer button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: none;
            z-index: 1000;
        }

        /* Стиль для скрытых полей-обманок */
        .hidden-fields {
            position: absolute; 
            height: 0; 
            width: 0; 
            overflow: hidden; 
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <form class="hidden-fields" aria-hidden="true">
        <input type="text" name="username">
        <input type="password" name="password">
        <input type="email" name="email">
        <input type="text" name="address">
        <input type="text" name="card">
    </form>

    <div class="header">
        <div class="top-row">
            <h2>Очередь</h2>
            <div class="action-btns">
                <button class="btn-sq" onclick="importFromClipboard()" title="Импорт">📥</button>
                <button class="btn-sq" onclick="exportToClipboard()" title="Экспорт">📋</button>
                <button class="btn-sq del" onclick="clearList()" title="Очистить">🗑️</button>
            </div>
        </div>
        <div class="search-box">
            <input type="search" id="searchInput" 
                   placeholder="Поиск" 
                   autocomplete="off" 
                   role="presentation">
        </div>
    </div>

    <ul id="peopleList"></ul>

    <div class="footer">
        <input type="search" id="nameInput" 
               placeholder="Имя участника" 
               autocomplete="off" 
               autocorrect="off" 
               autocapitalize="words" 
               spellcheck="false"
               role="presentation">
        <button id="addBtn">Ок</button>
    </div>
</div>

<div id="toast" class="toast">Скопировано!</div>

<script>
    const nameInput = document.getElementById('nameInput');
    const searchInput = document.getElementById('searchInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('peopleList');
    const toast = document.getElementById('toast');

    let startNumber = 1;

    function showToast(text) {
        toast.innerText = text;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function save() {
        const names = Array.from(list.querySelectorAll('.name')).map(s => s.innerText);
        localStorage.setItem('qData', JSON.stringify({start: startNumber, names: names}));
    }

    function load() {
        const saved = localStorage.getItem('qData');
        if (saved) {
            const data = JSON.parse(saved);
            startNumber = data.start || 1;
            data.names.forEach(n => list.appendChild(createItem(n)));
            updateList(false);
        }
    }

    function updateList(shouldScroll = true) {
        const items = list.querySelectorAll('li');
        const query = searchInput.value.toLowerCase().trim();

        items.forEach((item, index) => {
            const curNum = startNumber + index;
            item.querySelector('.number').innerText = curNum;
            const nameText = item.querySelector('.name').innerText.toLowerCase();
            
            if (query !== "" && (nameText.includes(query) || curNum.toString() === query)) {
                item.classList.add('found');
                if (shouldScroll) item.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else { item.classList.remove('found'); }
        });
        save();
    }

    function createItem(text) {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="number"></div>
            <span class="name">${text}</span>
            <div class="controls">
                <button class="move-btn" onclick="move(this.parentElement.parentElement, 'up')">▲</button>
                <button class="move-btn" onclick="move(this.parentElement.parentElement, 'down')">▼</button>
                <button class="delete-btn" onclick="del(this.parentElement.parentElement)">&times;</button>
            </div>
        `;
        return li;
    }

    async function importFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            const lines = text.split('\n');
            let foundCount = 0;
            lines.forEach(line => {
                const match = line.match(/(\d+)\s*лот\s*-\s*(.+?)(?:!|$)/);
                if (match) {
                    if (foundCount === 0) startNumber = parseInt(match[1]);
                    list.appendChild(createItem(match[2].trim()));
                    foundCount++;
                }
            });
            if (foundCount > 0) {
                updateList(false);
                showToast(`Импортировано: ${foundCount}`);
            } else { alert("Нет данных в нужном формате"); }
        } catch (err) { alert("Разрешите доступ к буферу обмена!"); }
    }

    function exportToClipboard() {
        const items = list.querySelectorAll('li');
        if (items.length === 0) return;
        items.forEach((item, index) => {
            res += `${startNumber + index} лот - ${item.querySelector('.name').innerText}!\n`;
        });
        navigator.clipboard.writeText(res).then(() => showToast("Скопировано!"));
    }

    function clearList() {
        if (confirm("Очистить всё?")) {
            list.innerHTML = '';
            startNumber = 1;
            save();
            showToast("Список очищен");
        }
    }

    function move(item, dir) {
        const sib = dir === 'up' ? item.previousElementSibling : item.nextElementSibling;
        if (sib) {
            const offset = item.offsetTop - sib.offsetTop;
            item.style.transform = `translateY(${-offset}px)`;
            sib.style.transform = `translateY(${offset}px)`;
            setTimeout(() => {
                item.style.transition = sib.style.transition = 'none';
                item.style.transform = sib.style.transform = '';
                if (dir === 'up') list.insertBefore(item, sib);
                else list.insertBefore(sib, item);
                updateList(false);
                setTimeout(() => {
                    item.style.transition = sib.style.transition = 'transform 0.3s ease';
                }, 10);
            }, 300);
        }
    }

    function del(item) {
        item.remove();
        updateList(false);
    }

    addBtn.onclick = () => {
        const val = nameInput.value.trim();
        if (val) {
            list.appendChild(createItem(val));
            updateList(false);
            nameInput.value = '';
            nameInput.focus();
        }
    };

    searchInput.oninput = () => updateList(true);
    nameInput.onkeypress = (e) => { if (e.key === 'Enter') addBtn.click(); };
    window.onload = load;
</script>

</body>
</html>
